name: Deploy (Fly)

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  deploy:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Install flyctl
        run: |
          curl -L https://fly.io/install.sh | sh
          echo "$HOME/.fly/bin" >> $GITHUB_PATH
          echo "$HOME/.fly" >> $GITHUB_PATH
          ls -lah "$HOME/.fly" || true
          ls -lah "$HOME/.fly/bin" || true
          "$HOME/.fly/bin/flyctl" version

      - name: Pre-deploy backup on Fly
        run: |
          flyctl ssh console -a daily-flow-bot -C "
            python -m scripts.backup.main \
              --db /data/app.db \
              --out /data/backups
          "

      - name: Deploy to Fly
        run: |
          flyctl deploy -a daily-flow-bot --remote-only --wait-timeout 300

      - name: Post-deploy healthcheck
        run: |
          # Даємо 10 секунд на остаточний запуск контейнера
          sleep 10
          flyctl ssh console -a daily-flow-bot --select -C "python3 -c \"
          import sqlite3, os
          db_path = '/data/app.db'
          if not os.path.exists(db_path):
              print(f'Error: DB not found at {db_path}'); exit(1)
          con = sqlite3.connect(db_path)
          con.execute('SELECT 1')
          con.close()
          print('DB OK')\""
