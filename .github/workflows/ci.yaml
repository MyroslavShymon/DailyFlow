name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]" || pip install -e .

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format (check)
        run: ruff format --check .

      - name: Mypy (non-blocking)
        continue-on-error: true
        run: mypy src

      - name: Build package
        run: python -m build

      - name: Sanity — import package
        run: python -c "import daily_flow"

      - name: Sanity — ingest help
        run: ingest --help

      - name: Sanity — bot help
        run: start_telegram_bot --help

      - name: Sanity — sqlite select 1
        run: python -c "import sqlite3; con=sqlite3.connect('ci_smoke.sqlite'); con.execute('select 1'); con.close()"

      - name: Security — pip-audit (non-blocking)
        run: pip-audit